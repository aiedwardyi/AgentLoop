<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentLoop Dashboard</title>
  <style>
    :root { color-scheme: dark; --bg: #101216; --panel: #171b22; --border: #303743; --muted: #95a0ae; --text: #edf1f5; --green: #56c271; --blue: #69a9ff; --yellow: #e6c35b; --red: #f07878; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.45 ui-monospace, Consolas, monospace; }
    .shell { max-width: 1120px; margin: 0 auto; padding: 28px 20px 48px; }
    .header, .panel-heading, .task-top, .daemon-status, .form-actions { display: flex; align-items: center; }
    .header { justify-content: space-between; gap: 24px; margin-bottom: 24px; }
    .eyebrow { margin: 0 0 2px; color: var(--muted); font-size: 12px; text-transform: uppercase; }
    h1, h2, p { margin-top: 0; }
    h1 { margin-bottom: 0; font-size: 24px; }
    h2 { margin-bottom: 0; font-size: 13px; letter-spacing: 0.08em; }
    .daemon-status { flex-wrap: wrap; justify-content: flex-end; gap: 8px; color: var(--muted); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); }
    .dot.dead { background: var(--red); }
    .meta { padding-left: 8px; border-left: 1px solid var(--border); }
    .panel { margin-bottom: 18px; padding: 18px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); }
    .panel-heading { justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .task-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .task-grid .panel { margin-bottom: 0; }
    .form-grid { display: grid; grid-template-columns: minmax(0, 1fr) 190px 110px; gap: 14px; }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 12px; }
    textarea, input, button { font: inherit; }
    textarea, input { width: 100%; border: 1px solid var(--border); border-radius: 5px; background: #0d0f13; color: var(--text); padding: 9px 10px; }
    textarea { min-height: 82px; resize: vertical; }
    textarea:focus, input:focus, button:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
    .form-actions { justify-content: flex-end; margin-top: 14px; }
    button { border: 1px solid #496f9e; border-radius: 5px; background: #23476f; color: var(--text); cursor: pointer; padding: 9px 13px; }
    button:hover { background: #2a5686; }
    button:disabled { cursor: wait; opacity: 0.65; }
    .form-message { min-height: 1.45em; margin: 10px 0 0; color: var(--muted); }
    .form-message.success { color: var(--green); }
    .form-message.error { color: var(--red); }
    .task-list { display: grid; gap: 9px; }
    .task-row { width: 100%; display: grid; gap: 7px; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: #12151b; color: var(--text); text-align: left; }
    button.task-row { cursor: pointer; }
    button.task-row:hover { background: #181d25; }
    .task-top { min-width: 0; gap: 9px; }
    .task-title { overflow: hidden; flex: 1; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
    .task-id, .task-times { color: var(--muted); font-size: 12px; }
    .task-times { white-space: pre-wrap; }
    .badge { flex: 0 0 auto; border: 1px solid currentColor; border-radius: 999px; padding: 1px 7px; font-size: 11px; text-transform: uppercase; }
    .badge-pending { color: var(--yellow); } .badge-running { color: var(--blue); }
    .badge-done { color: var(--green); } .badge-failed { color: var(--red); }
    .task-details { display: grid; gap: 10px; padding: 12px; border: 1px solid var(--border); border-top: 0; border-radius: 0 0 6px 6px; background: #0e1116; }
    .detail { display: grid; gap: 4px; }
    .detail-label { color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .detail-value { margin: 0; overflow-wrap: anywhere; white-space: pre-wrap; }
    .empty { margin: 0; color: var(--muted); }
    @media (max-width: 720px) { .header { align-items: flex-start; flex-direction: column; } .daemon-status { justify-content: flex-start; } .task-grid, .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div><p class="eyebrow">AgentLoop</p><h1>Dashboard</h1></div>
      <div class="daemon-status" aria-live="polite">
        <span id="daemon-dot" class="dot dead" aria-hidden="true"></span><span id="daemon-state">checking</span>
        <span class="meta">port <span id="daemon-port">-</span></span><span class="meta">started <span id="daemon-started">-</span></span>
      </div>
    </header>
    <section class="panel" aria-labelledby="new-task-heading">
      <div class="panel-heading"><h2 id="new-task-heading">NEW TASK</h2></div>
      <form id="task-form">
        <div class="form-grid">
          <label>Prompt<textarea id="prompt" name="prompt" required></textarea></label>
          <label>Title<input id="title" name="title" type="text"></label>
          <label>Priority<input id="priority" name="priority" type="number" value="5"></label>
        </div>
        <div class="form-actions"><button id="submit-task" type="submit">Queue task</button></div>
        <p id="form-message" class="form-message" aria-live="polite"></p>
      </form>
    </section>
    <div class="task-grid">
      <section class="panel" aria-labelledby="running-heading"><div class="panel-heading"><h2 id="running-heading">RUNNING</h2></div><div id="running-list" class="task-list"></div></section>
      <section class="panel" aria-labelledby="pending-heading"><div class="panel-heading"><h2 id="pending-heading">PENDING</h2></div><div id="pending-list" class="task-list"></div></section>
    </div>
    <section class="panel" aria-labelledby="recent-heading">
      <div class="panel-heading"><h2 id="recent-heading">RECENT</h2></div><div id="recent-list" class="task-list"></div>
    </section>
  </main>
  <script>
    (() => {
      const form = document.querySelector('#task-form');
      const promptField = document.querySelector('#prompt');
      const titleField = document.querySelector('#title');
      const priorityField = document.querySelector('#priority');
      const submitButton = document.querySelector('#submit-task');
      const message = document.querySelector('#form-message');
      const daemonDot = document.querySelector('#daemon-dot');
      const daemonState = document.querySelector('#daemon-state');
      const daemonPort = document.querySelector('#daemon-port');
      const daemonStarted = document.querySelector('#daemon-started');
      const runningList = document.querySelector('#running-list');
      const pendingList = document.querySelector('#pending-list');
      const recentList = document.querySelector('#recent-list');
      const expanded = new Set();
      const statuses = new Set(['pending', 'running', 'done', 'failed']);
      let recentTasks = [];
      let messageTimer;

      function valueText(value, fallback = '') {
        return value === undefined || value === null || value === '' ? fallback : String(value);
      }

      function element(tag, className, value) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (value !== undefined) node.textContent = valueText(value);
        return node;
      }

      function taskObject(task) {
        return task && typeof task === 'object' ? task : {};
      }

      function formatTime(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '--:--:--';
        return [date.getHours(), date.getMinutes(), date.getSeconds()]
          .map((part) => String(part).padStart(2, '0')).join(':');
      }

      function taskStatus(task, fallback) {
        const status = taskObject(task).status;
        return typeof status === 'string' && statuses.has(status) ? status : fallback;
      }

      function taskTimes(task) {
        const value = taskObject(task);
        const times = [];
        if (value.createdAt) times.push(`created ${formatTime(value.createdAt)}`);
        if (value.startedAt) times.push(`started ${formatTime(value.startedAt)}`);
        if (value.finishedAt) times.push(`finished ${formatTime(value.finishedAt)}`);
        return times.length ? times.join('  ') : 'time unavailable';
      }

      function taskKey(task) {
        return valueText(taskObject(task).id, 'unknown');
      }

      function createTaskRow(task, fallbackStatus, expandable) {
        const value = taskObject(task);
        const status = taskStatus(value, fallbackStatus);
        const row = element(expandable ? 'button' : 'div', 'task-row');
        const top = element('span', 'task-top');
        if (expandable) row.type = 'button';
        top.append(
          element('span', 'task-title', valueText(value.title, 'untitled')),
          element('span', `badge badge-${status}`, status),
        );
        row.append(top, element('span', 'task-id', valueText(value.id, 'unknown')));
        row.append(element('span', 'task-times', taskTimes(value)));
        return row;
      }

      function detail(label, value) {
        const block = element('div', 'detail');
        block.append(element('span', 'detail-label', label), element('pre', 'detail-value', value));
        return block;
      }

      function createDetails(task) {
        const value = taskObject(task);
        const details = element('div', 'task-details');
        const has = Object.prototype.hasOwnProperty;
        details.append(detail('summary', has.call(value, 'summary') ? valueText(value.summary) : 'No summary available.'));
        if (has.call(value, 'reason')) details.append(detail('reason', valueText(value.reason)));
        details.append(detail('prompt', valueText(value.prompt, 'No prompt available.')));
        return details;
      }

      function renderList(container, tasks, fallbackStatus) {
        const entries = Array.isArray(tasks) ? tasks : [];
        container.replaceChildren();
        if (!entries.length) return container.append(element('p', 'empty', 'No tasks.'));
        for (const task of entries) container.append(createTaskRow(task, fallbackStatus, false));
      }

      function renderRecent(tasks) {
        recentTasks = Array.isArray(tasks) ? tasks : [];
        recentList.replaceChildren();
        if (!recentTasks.length) return recentList.append(element('p', 'empty', 'No tasks.'));
        for (const task of recentTasks) {
          const key = taskKey(task);
          const open = expanded.has(key);
          const item = element('div', 'recent-item');
          const row = createTaskRow(task, 'done', true);
          row.setAttribute('aria-expanded', String(open));
          row.addEventListener('click', () => {
            if (expanded.has(key)) expanded.delete(key); else expanded.add(key);
            renderRecent(recentTasks);
          });
          item.append(row);
          if (open) item.append(createDetails(task));
          recentList.append(item);
        }
      }

      function updateDaemon(daemon) {
        const value = daemon && typeof daemon === 'object' ? daemon : {};
        const alive = value.alive === true;
        daemonDot.classList.toggle('dead', !alive);
        daemonState.textContent = alive ? 'alive' : 'dead';
        daemonPort.textContent = valueText(value.port, '-');
        daemonStarted.textContent = value.startedAt ? formatTime(value.startedAt) : '-';
      }

      function markDaemonDead() {
        daemonDot.classList.add('dead');
        daemonState.textContent = 'dead';
      }

      function showMessage(text, type, timeout) {
        window.clearTimeout(messageTimer);
        message.className = `form-message ${type}`;
        message.textContent = valueText(text);
        if (!timeout) return;
        messageTimer = window.setTimeout(() => {
          message.className = 'form-message';
          message.textContent = '';
        }, timeout);
      }

      async function loadState() {
        try {
          const response = await fetch('/api/state', { cache: 'no-store' });
          if (!response.ok) throw new Error(`State request failed (${response.status}).`);
          const state = await response.json();
          updateDaemon(state.daemon);
          renderList(runningList, state.running, 'running');
          renderList(pendingList, state.pending, 'pending');
          renderRecent(state.recent);
        } catch {
          markDaemonDead();
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!promptField.value.trim()) {
          showMessage('Prompt is required.', 'error');
          promptField.focus();
          return;
        }
        const priority = Number(priorityField.value);
        submitButton.disabled = true;
        try {
          const response = await fetch('/api/dispatch', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              prompt: promptField.value,
              title: titleField.value,
              priority: Number.isFinite(priority) ? priority : 5,
            }),
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(valueText(result.error, `Request failed (${response.status}).`));
          if (!result || typeof result.id !== 'string') throw new Error('The daemon did not return a task id.');
          form.reset();
          priorityField.value = '5';
          showMessage(`Queued ${result.id}.`, 'success', 4000);
          loadState();
        } catch (error) {
          showMessage(error && error.message ? error.message : 'Unable to queue task.', 'error');
        } finally {
          submitButton.disabled = false;
        }
      });

      loadState();
      window.setInterval(loadState, 2000);
    })();
  </script>
</body>
</html>
